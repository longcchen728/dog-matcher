<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Dog Are You? — Breed Matcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1F3A4D; --ink-soft:#5B7280;
    --paper:#DCEEF7; --card:#FFFFFF;
    --coral:#FF7059; --coral-dark:#E2503B;
    --sun:#FFC857; --grass:#6FB088; --grass-dark:#4F8E68;
    --line:#CFE6F2; --radius:20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito',system-ui,-apple-system,sans-serif;
    color:var(--ink); background:var(--paper);
    background-image:radial-gradient(var(--line) 1.2px, transparent 1.2px);
    background-size:26px 26px;
    min-height:100vh; line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:640px;margin:0 auto;padding:32px 20px 56px;}
  h1,h2,h3{font-family:'Fredoka',sans-serif;font-weight:600;margin:0;line-height:1.15;}

  .screen{display:none;animation:rise .45s ease both;}
  .screen.active{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

  .card{
    background:var(--card);border:2px solid var(--line);border-radius:var(--radius);
    padding:28px 24px;box-shadow:0 8px 0 rgba(31,58,77,0.06);
  }

  .hero{text-align:center;}
  .hero h1{font-size:40px;letter-spacing:-0.5px;margin-bottom:6px;}
  .hero .tagline{font-size:18px;color:var(--ink-soft);font-weight:700;margin-bottom:10px;}
  .hero p.lead{font-size:16px;color:var(--ink-soft);max-width:440px;margin:0 auto 24px;}
  .mascot{width:150px;height:150px;margin:4px auto 14px;display:block;}

  .btn{
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:18px;color:#fff;
    background:var(--coral);border:none;border-radius:999px;padding:14px 32px;
    cursor:pointer;box-shadow:0 5px 0 var(--coral-dark);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--coral-dark);}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--coral-dark);}
  .btn.secondary{background:var(--card);color:var(--ink);box-shadow:0 5px 0 var(--line);border:2px solid var(--line);}
  .btn.secondary:hover{box-shadow:0 7px 0 var(--line);}
  .btn.secondary:active{box-shadow:0 2px 0 var(--line);}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:3px;}
  .footnote{font-size:13px;color:var(--ink-soft);margin-top:18px;}

  .pawbar{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .pawtrack{flex:1;height:14px;background:#fff;border:2px solid var(--line);border-radius:999px;overflow:hidden;}
  .pawfill{height:100%;width:5%;background:var(--grass);border-radius:999px;transition:width .35s cubic-bezier(.34,1.56,.64,1);}
  .pawcount{font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:var(--ink-soft);white-space:nowrap;}

  .qnum{
    display:inline-flex;align-items:center;gap:7px;font-family:'Fredoka',sans-serif;
    font-weight:600;font-size:14px;color:var(--coral-dark);background:#FFE7E2;
    padding:5px 14px;border-radius:999px;margin-bottom:14px;
  }
  .question{font-family:'Fredoka',sans-serif;font-weight:600;font-size:25px;line-height:1.25;margin-bottom:22px;}

  .opt{
    display:block;width:100%;text-align:left;font-family:'Nunito',sans-serif;
    font-weight:700;font-size:17px;color:var(--ink);background:#fff;
    border:2px solid var(--line);border-radius:14px;padding:15px 18px;margin-bottom:12px;
    cursor:pointer;transition:transform .1s ease, border-color .1s ease, background .1s ease;
  }
  .opt:hover{border-color:var(--coral);background:#FFF6F4;transform:translateX(4px);}
  .opt:focus-visible{outline:3px solid var(--ink);outline-offset:2px;}
  .opt .dot{display:inline-block;width:12px;height:12px;border-radius:50%;border:2px solid var(--line);margin-right:12px;vertical-align:middle;}
  .opt:hover .dot{border-color:var(--coral);background:var(--coral);}

  .backlink{
    display:inline-flex;align-items:center;gap:6px;margin-top:6px;font-family:'Fredoka',sans-serif;
    font-weight:500;font-size:15px;color:var(--ink-soft);background:none;border:none;cursor:pointer;
  }
  .backlink:hover{color:var(--ink);}

  .result-hero{text-align:center;background:linear-gradient(180deg,#FFF6EC 0%,#FFFFFF 100%);}
  .matchlabel{
    display:inline-block;font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;
    color:var(--grass-dark);background:#E6F4EC;padding:5px 16px;border-radius:999px;margin-bottom:6px;
  }
  .breedname{font-size:34px;letter-spacing:-0.5px;margin:6px 0 4px;}
  .pct{font-family:'Fredoka',sans-serif;font-weight:700;font-size:18px;color:var(--coral-dark);margin-bottom:12px;}
  .blurb{font-size:16px;color:var(--ink-soft);max-width:460px;margin:0 auto;}

  .section-label{font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:1px;margin:26px 0 12px;}
  .runner{
    display:flex;align-items:center;gap:14px;background:#fff;border:2px solid var(--line);
    border-radius:14px;padding:12px 16px;margin-bottom:10px;
  }
  .runner .badge{width:42px;height:42px;border-radius:12px;background:var(--paper);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .runner .badge svg{width:28px;height:28px;}
  .runner .rname{font-family:'Fredoka',sans-serif;font-weight:600;font-size:17px;}
  .runner .rpct{font-size:14px;color:var(--ink-soft);font-weight:700;}

  .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px;}
  .actions .btn{flex:1;min-width:160px;font-size:16px;padding:13px 20px;}

  .tailwag{transform-origin:74px 78px;animation:wag 0.6s ease-in-out infinite;}
  @keyframes wag{0%,100%{transform:rotate(-12deg);}50%{transform:rotate(14deg);}}

  @media (prefers-reduced-motion: reduce){
    .screen,.pawfill,.btn,.opt{animation:none!important;transition:none!important;}
    .tailwag{animation:none!important;}
  }
  @media (max-width:480px){
    .hero h1{font-size:32px;} .breedname{font-size:28px;} .question{font-size:21px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== START SCREEN ===== -->
  <section id="screen-start" class="screen active">
    <div class="card hero">
      <svg class="mascot" viewBox="0 0 120 120" aria-hidden="true">
        <ellipse cx="60" cy="108" rx="34" ry="7" fill="#CFE6F2"/>
        <path d="M30 52 C26 30 38 22 38 22 C44 30 46 40 46 46 Z" fill="#C8814B"/>
        <path d="M90 52 C94 30 82 22 82 22 C76 30 74 40 74 46 Z" fill="#C8814B"/>
        <circle cx="60" cy="62" r="34" fill="#E8A86A"/>
        <ellipse cx="48" cy="56" rx="6.5" ry="8" fill="#2B2A28"/>
        <ellipse cx="72" cy="56" rx="6.5" ry="8" fill="#2B2A28"/>
        <circle cx="50" cy="53" r="2" fill="#fff"/>
        <circle cx="74" cy="53" r="2" fill="#fff"/>
        <ellipse cx="60" cy="72" rx="9" ry="7" fill="#2B2A28"/>
        <path d="M60 79 L60 86" stroke="#2B2A28" stroke-width="3" stroke-linecap="round"/>
        <path d="M60 86 C54 86 52 90 56 92" fill="none" stroke="#E2503B" stroke-width="3" stroke-linecap="round"/>
        <path d="M60 86 C66 86 68 90 64 92" fill="none" stroke="#E2503B" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <h1>Which Dog Are You?</h1>
      <p class="tagline">A 20-question breed matcher</p>
      <p class="lead">Answer a few honest questions about your life, your home, and what you love — and meet the dog breed that fits you best.</p>
      <button class="btn" onclick="start()">Start the quiz</button>
      <p class="footnote">Just for fun &amp; learning. Every real dog is an individual!</p>
    </div>
  </section>

  <!-- ===== QUIZ SCREEN ===== -->
  <section id="screen-quiz" class="screen">
    <div class="pawbar">
      <div class="pawtrack"><div id="pawfill" class="pawfill"></div></div>
      <span id="pawcount" class="pawcount">1 / 20</span>
    </div>
    <div class="card">
      <div id="qnum" class="qnum">Question 1</div>
      <h2 id="question" class="question"></h2>
      <div id="options"></div>
      <button id="backbtn" class="backlink" onclick="goBack()" style="display:none;">&larr; Back</button>
    </div>
  </section>

  <!-- ===== RESULT SCREEN ===== -->
  <section id="screen-result" class="screen">
    <div class="card result-hero">
      <svg class="mascot" viewBox="0 0 130 120" aria-hidden="true">
        <ellipse cx="62" cy="108" rx="36" ry="7" fill="#E8D9C2"/>
        <path class="tailwag" d="M88 78 C104 70 110 60 108 54 C104 64 94 70 86 72 Z" fill="#C8814B"/>
        <path d="M32 52 C28 30 40 22 40 22 C46 30 48 40 48 46 Z" fill="#C8814B"/>
        <path d="M92 52 C96 30 84 22 84 22 C78 30 76 40 76 46 Z" fill="#C8814B"/>
        <circle cx="62" cy="62" r="34" fill="#E8A86A"/>
        <ellipse cx="50" cy="56" rx="6.5" ry="8" fill="#2B2A28"/>
        <ellipse cx="74" cy="56" rx="6.5" ry="8" fill="#2B2A28"/>
        <circle cx="52" cy="53" r="2" fill="#fff"/>
        <circle cx="76" cy="53" r="2" fill="#fff"/>
        <ellipse cx="62" cy="72" rx="9" ry="7" fill="#2B2A28"/>
        <path d="M62 79 L62 85" stroke="#2B2A28" stroke-width="3" stroke-linecap="round"/>
        <path d="M50 90 C56 96 68 96 74 90" fill="none" stroke="#E2503B" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span class="matchlabel">Your top match</span>
      <h2 id="topname" class="breedname"></h2>
      <div id="toppct" class="pct"></div>
      <p id="topblurb" class="blurb"></p>
    </div>

    <div class="section-label">Also worth a look</div>
    <div id="runners"></div>

    <div class="actions">
      <button class="btn" onclick="window.print()">Save / print result</button>
      <button class="btn secondary" onclick="restart()">Start over</button>
    </div>
  </section>

</div>

<script>
const BREEDS = [
  { name:'Labrador Retriever', blurb:'Friendly, eager, and endlessly good-natured — a classic family dog that loves people and play.', t:{energy:4,size:4,grooming:2,train:5,social:5,space:4,bark:3,indep:2,novice:5,affection:5} },
  { name:'Golden Retriever', blurb:'Gentle, smart, and devoted. Great with kids and easy to train, with a bit more coat to brush.', t:{energy:4,size:4,grooming:3,train:5,social:5,space:4,bark:2,indep:2,novice:5,affection:5} },
  { name:'French Bulldog', blurb:'A small, easygoing charmer. Low exercise needs make it a wonderful apartment companion.', t:{energy:2,size:2,grooming:2,train:3,social:4,space:1,bark:2,indep:2,novice:4,affection:5} },
  { name:'German Shepherd', blurb:'Loyal, athletic, and highly trainable — a working breed that thrives with an active, experienced owner.', t:{energy:5,size:5,grooming:3,train:5,social:3,space:4,bark:3,indep:3,novice:2,affection:4} },
  { name:'Standard Poodle', blurb:'Brilliant and low-shedding, but the curly coat needs real grooming. Loves to learn new things.', t:{energy:4,size:4,grooming:5,train:5,social:4,space:3,bark:3,indep:2,novice:4,affection:4} },
  { name:'Chihuahua', blurb:'Tiny, bold, and portable. Bonds hard with one person and is happy in small spaces.', t:{energy:3,size:1,grooming:1,train:2,social:2,space:1,bark:4,indep:3,novice:3,affection:4} },
  { name:'Border Collie', blurb:'The brainiest, most energetic breed around. Needs a job and lots of activity — not for a casual home.', t:{energy:5,size:3,grooming:3,train:5,social:3,space:4,bark:3,indep:2,novice:1,affection:4} },
  { name:'Beagle', blurb:'Merry, curious, and friendly, with a strong nose and a loud voice. Great with families.', t:{energy:4,size:2,grooming:2,train:2,social:4,space:3,bark:4,indep:4,novice:3,affection:4} },
  { name:'Shih Tzu', blurb:'A small, lap-loving companion with a long coat that needs regular grooming. Happy indoors.', t:{energy:2,size:1,grooming:5,train:2,social:4,space:1,bark:2,indep:2,novice:4,affection:5} },
  { name:'Siberian Husky', blurb:'Stunning, independent, and built to run. Sheds a lot and needs serious exercise and patience.', t:{energy:5,size:4,grooming:4,train:2,social:3,space:4,bark:4,indep:5,novice:1,affection:3} },
  { name:'Dachshund', blurb:'A little hound with a big personality. Spirited, vocal, and devoted to its people.', t:{energy:3,size:1,grooming:2,train:2,social:3,space:1,bark:4,indep:4,novice:3,affection:4} },
  { name:'Cavalier King Charles Spaniel', blurb:'Sweet, gentle, and affectionate — a wonderful, easygoing companion for almost any home.', t:{energy:2,size:2,grooming:3,train:4,social:5,space:1,bark:2,indep:1,novice:5,affection:5} },
  { name:'Great Dane', blurb:'A giant gentle soul. Surprisingly calm indoors, but needs space and a bigger care budget.', t:{energy:2,size:5,grooming:1,train:3,social:4,space:5,bark:2,indep:2,novice:3,affection:4} },
  { name:'Jack Russell Terrier', blurb:'Small but turbo-charged. Fearless, clever, and tireless — best for active, hands-on owners.', t:{energy:5,size:1,grooming:1,train:3,social:3,space:2,bark:4,indep:4,novice:2,affection:3} },
  { name:'Pug', blurb:'A comedian in a small package. Loves everyone, low energy, and very cuddly.', t:{energy:2,size:2,grooming:2,train:2,social:5,space:1,bark:2,indep:2,novice:4,affection:5} },
  { name:'Bernese Mountain Dog', blurb:'A big, mellow, affectionate family dog with a thick coat. Calm and devoted.', t:{energy:3,size:5,grooming:4,train:4,social:5,space:4,bark:2,indep:2,novice:4,affection:5} }
];

const QUESTIONS = [
  { q:'What kind of home do you live in?', o:[
    {t:'Apartment or condo', e:{space:1,size:2}},
    {t:'House, small or no yard', e:{space:2,size:3}},
    {t:'House with a yard', e:{space:4,size:4}},
    {t:'Big property or rural land', e:{space:5,size:5}} ]},
  { q:'How active are you day to day?', o:[
    {t:"I'm a homebody", e:{energy:1}},
    {t:'Casual — some walks', e:{energy:2}},
    {t:'Pretty active', e:{energy:4}},
    {t:'Always on the go', e:{energy:5}} ]},
  { q:'How much time can you give to dog exercise daily?', o:[
    {t:'Under 30 minutes', e:{energy:1}},
    {t:'About an hour', e:{energy:3}},
    {t:'One to two hours', e:{energy:4}},
    {t:'As much as the dog needs', e:{energy:5}} ]},
  { q:'How much will the dog be left alone?', o:[
    {t:"Almost never — someone's home", e:{indep:1}},
    {t:'A few hours at a time', e:{indep:2}},
    {t:'A full workday sometimes', e:{indep:4}},
    {t:'Often on its own', e:{indep:5}} ]},
  { q:'How much grooming are you up for?', o:[
    {t:'Wash-and-go, minimal', e:{grooming:1}},
    {t:'A weekly brush', e:{grooming:2}},
    {t:'Regular brushing and trims', e:{grooming:4}},
    {t:"I'd love a fancy-coat dog", e:{grooming:5}} ]},
  { q:'How do you feel about shedding?', o:[
    {t:"It's a dealbreaker", e:{grooming:4}},
    {t:'A little is fine', e:{grooming:3}},
    {t:"Don't care about fur", e:{grooming:2}} ]},
  { q:'What size dog appeals to you?', o:[
    {t:'Tiny lapdog', e:{size:1}},
    {t:'Small', e:{size:2}},
    {t:'Medium', e:{size:3}},
    {t:'Large or giant', e:{size:5}} ]},
  { q:'Are there children in your home?', o:[
    {t:'Young children', e:{social:5,novice:4}},
    {t:'Older kids or teens', e:{social:4}},
    {t:'No kids', e:{social:3}} ]},
  { q:'Any other pets at home?', o:[
    {t:'Yes — other dogs or cats', e:{social:5}},
    {t:'No other pets', e:{social:3}} ]},
  { q:'How much experience do you have with dogs?', o:[
    {t:'First-time owner', e:{novice:5}},
    {t:'Had one or two before', e:{novice:3}},
    {t:'Very experienced', e:{novice:1}} ]},
  { q:'How into training are you?', o:[
    {t:'Keep it simple', e:{train:2}},
    {t:'Just basic manners', e:{train:3}},
    {t:'I love teaching tricks', e:{train:5}} ]},
  { q:'How do you feel about barking?', o:[
    {t:'I need a quiet dog', e:{bark:1}},
    {t:'A little is okay', e:{bark:3}},
    {t:"Bark away, I don't mind", e:{bark:5}} ]},
  { q:'How close do you want your dog to be?', o:[
    {t:'An independent companion', e:{affection:2,indep:4}},
    {t:'A nice balance', e:{affection:3,indep:3}},
    {t:'A velcro cuddle-buddy', e:{affection:5,indep:1}} ]},
  { q:"What's the climate where you live?", o:[
    {t:'Hot most of the year', e:{grooming:2}},
    {t:'Cold winters', e:{grooming:4}},
    {t:'Mild or mixed', e:{grooming:3}} ]},
  { q:"What's your budget for food, vet, and care?", o:[
    {t:'Keep it modest', e:{size:2}},
    {t:'A comfortable middle', e:{size:3}},
    {t:'Whatever it takes', e:{size:4}} ]},
  { q:'Why do you want a dog most of all?', o:[
    {t:'Companionship — a buddy', e:{affection:5,energy:2}},
    {t:'An adventure partner', e:{energy:5,train:4}},
    {t:'A family pet', e:{social:5,novice:4}},
    {t:'A watchdog', e:{train:5,bark:4,size:4}} ]},
  { q:'How do you feel about high-energy zoomies?', o:[
    {t:'Love the chaos', e:{energy:5}},
    {t:'In small doses', e:{energy:3}},
    {t:'I prefer a calm dog', e:{energy:1}} ]},
  { q:'Any allergy concerns in the household?', o:[
    {t:'Need a low-allergen dog', e:{grooming:5}},
    {t:'No allergy concerns', e:{grooming:3}} ]},
  { q:'Do you want a dog you can take everywhere?', o:[
    {t:'Yes — small enough to carry', e:{size:1}},
    {t:'Outings are nice but optional', e:{size:3}},
    {t:'A homebody dog is fine', e:{size:4}} ]},
  { q:'How much patience do you have for a stubborn streak?', o:[
    {t:'Lots — independence is charming', e:{train:2,indep:4}},
    {t:'Somewhat', e:{train:3}},
    {t:'I want eager-to-please', e:{train:5,indep:1}} ]}
];

const DIMS = ['energy','size','grooming','train','social','space','bark','indep','novice','affection'];
const PAW = '<svg viewBox="0 0 24 24" fill="#6FB088"><circle cx="6" cy="11" r="2.4"/><circle cx="12" cy="8.5" r="2.4"/><circle cx="18" cy="11" r="2.4"/><circle cx="12" cy="16" r="3.4"/></svg>';

let idx = 0, history = [];
const sums = {}, counts = {};
function reset(){ DIMS.forEach(d=>{sums[d]=0;counts[d]=0;}); idx=0; history=[]; }
reset();

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function start(){ reset(); renderQuestion(); show('screen-quiz'); }

function updateProgress(){
  const pct = Math.round((idx/QUESTIONS.length)*100);
  document.getElementById('pawfill').style.width = Math.max(pct,4)+'%';
  document.getElementById('pawcount').textContent = Math.min(idx+1,QUESTIONS.length)+' / '+QUESTIONS.length;
}

function renderQuestion(){
  updateProgress();
  const Q = QUESTIONS[idx];
  document.getElementById('qnum').innerHTML = PAW.replace('viewBox','width="16" height="16" style="vertical-align:-2px" viewBox') + ' Question '+(idx+1);
  document.getElementById('question').textContent = Q.q;
  const wrap = document.getElementById('options');
  wrap.innerHTML = '';
  Q.o.forEach((opt,i)=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = '<span class="dot"></span>'+opt.t;
    b.onclick = ()=>choose(i);
    wrap.appendChild(b);
  });
  document.getElementById('backbtn').style.display = idx>0 ? 'inline-flex' : 'none';
}

function choose(i){
  const e = QUESTIONS[idx].o[i].e, applied={};
  for(const d in e){ sums[d]+=e[d]; counts[d]++; applied[d]=e[d]; }
  history.push(applied);
  idx++;
  if(idx>=QUESTIONS.length) renderResults();
  else renderQuestion();
}
function goBack(){
  if(idx===0) return;
  idx--;
  const applied = history.pop();
  for(const d in applied){ sums[d]-=applied[d]; counts[d]--; }
  renderQuestion();
}

function renderResults(){
  const p = {};
  DIMS.forEach(d=>{ p[d]=counts[d]>0?sums[d]/counts[d]:3; });
  const scored = BREEDS.map(b=>{
    let dist=0; DIMS.forEach(d=>{ dist+=Math.abs(p[d]-b.t[d]); });
    return { b, dist, pct:Math.round((1-dist/40)*100) };
  }).sort((a,z)=>a.dist-z.dist);

  const top = scored[0];
  document.getElementById('topname').textContent = top.b.name;
  document.getElementById('toppct').textContent = top.pct+'% match';
  document.getElementById('topblurb').textContent = top.b.blurb;

  const rwrap = document.getElementById('runners');
  rwrap.innerHTML = '';
  scored.slice(1,4).forEach(r=>{
    const div = document.createElement('div');
    div.className = 'runner';
    div.innerHTML =
      '<div class="badge">'+PAW.replace('viewBox','width="28" height="28" viewBox')+'</div>'+
      '<div style="flex:1;"><div class="rname">'+r.b.name+'</div></div>'+
      '<div class="rpct">'+r.pct+'%</div>';
    rwrap.appendChild(div);
  });
  show('screen-result');
}
function restart(){ start(); }
